[loggers]
keys=root, lighthouse

[handlers]
keys=consoleHandler, fileHandler

[formatters]
keys=lighthouseFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler, fileHandler

[logger_lighthouse]
level=DEBUG
handlers=consoleHandler, fileHandler
qualname=lighthouse
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=lighthouseFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=logging.handlers.RotatingFileHandler
level=DEBUG
formatter=lighthouseFormatter
args=('logs/lighthouse.log', 'a', 1024*1024, 10)

[formatter_lighthouseFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s